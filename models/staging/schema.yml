version: 2

models:
    - name: stg_orders
      columns: 
        - name: order_id
          tests:
            - unique
            - not_null
        - name: customer_id
          tests:
            - not_null
        - name: statut
          tests: 
            - accepted_values:
                values: ['confirmée', 'expédiée', 'livrée', 'annulée', 'remboursée']
        - name: montant_total_ht
          tests: 
            - not_null
    - name: stg_customers
      columns: 
        - name: customer_id
          tests: 
            - not_null
            - unique
        - name : email
          tests: 
            - not_null:
                config:
                    severity: warn  
        - name : pays
          tests: 
            - accepted_values:
                values: ['France','Belgique', 'Suisse', 'Allemagne', 'Luxembourg']
    - name: stg_products
      columns: 
        - name: product_id 
          tests: 
            - not_null
            - unique 
        - name: prix_vente_ht
          tests: 
            - not_null:
                config:
                  severity: warn
            - dbt_utils.expression_is_true:
                expression: ">= 0"
        - name: product_name
          tests: 
            - not_null
        - name: categorie
          tests:
            - accepted_values:
                values: ['Accessoires', 'Chaussures', 'Vêtements techniques', 'Equipements', 'Autre']
        - name: ean13
          tests: 
            - unique:
                config:
                  severity: warn
    - name: stg_products_variants
      columns: 
        - name: variant_id
          tests: 
            - not_null
            - unique
        - name: product_id
          tests: 
            - relationships:
                to: ref('stg_products')
                field: product_id
        - name: sku
          tests: 
            - unique:
                config:
                  severity: warn
            - not_null
    - name: stg_price_history
      columns: 
        - name: price_history_id
          tests: 
            - unique
            - not_null 
        - name: product_id
          tests: 
            - relationships: 
                to: ref('stg_products')
                field: product_id
        - name: prix_vente_ht 
          tests: 
            - dbt_utils.expression_is_true:
                expression: ">= 0"
        - name: is_current
          tests: 
            - accepted_values:
                values: ['0','1']
        - name: motif
          tests: 
            - accepted_values: 
                values: ['promotion saisonnière','réajustement', 'soldes','lancement']
                config: 
                  severity: warn